name: Build Zongheng for branch Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: zongheng-build
  cancel-in-progress: false

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip zongheng deploy]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Zongheng
        run: |
          cp index.html root-site-index.html
          cp zongheng-source.html index.html
          npm run build
          mv root-site-index.html index.html

      - name: Commit Zongheng site under /zongheng/
        run: |
          rm -rf zongheng
          cp -r dist zongheng
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zongheng
          git commit -m "Publish 纵横 website [skip zongheng deploy]"
          git push
